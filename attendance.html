<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출석체크 - 강동어울림복지관</title>
  <link rel="stylesheet" href="css/style.css?v=3">
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>
  <div class="app-container">
    <nav class="nav-sidebar">
      <div class="logo">강동어울림복지관</div>
      <a href="dashboard.html" class="nav-item">대시보드</a>
      <a href="attendance.html" class="nav-item active">출석체크</a>
      <a href="members.html" class="nav-item">회원 관리</a>
      <a href="programs.html" class="nav-item">사업 관리</a>
      <a href="stats.html" class="nav-item">실적 현황</a>
    </nav>
    
    <main class="main-content">
      <header class="topbar">
        <div>출석부 시스템</div>
        <div class="flex items-center gap-2">
          <span id="topbar-team-name" class="badge badge-neutral"></span>
          <span id="topbar-user-name"></span>
          <button onclick="Auth.logout()" class="btn-ghost" style="padding: 4px 8px;">로그아웃</button>
        </div>
      </header>
      
      <div class="content-body">
        <h2 class="mb-3">출석체크</h2>
        
        <div class="glass-card mb-3">
          <h3 class="mb-2">Step 1. 사업 선택</h3>
          <div id="dropdowns-container"></div>
          
          <div class="form-group" style="max-width: 200px; margin-top: 16px;">
            <label class="form-label">날짜 선택</label>
            <input type="date" id="attendance-date" class="form-input" required>
          </div>
          
          <div id="selected-program-info" class="mt-3 hidden flex items-center gap-1">
            <button id="btn-show-qr" class="btn-secondary">QR코드 생성</button>
            <button id="btn-enter-kiosk" class="btn-primary">이용인 셀프 출석</button>
          </div>
        </div>

        <div class="glass-card mb-3 hidden" id="attendance-section">
          <div class="flex justify-between items-center mb-2">
            <h3>Step 2. 출석 입력</h3>
            <div id="attendance-counter"></div>
          </div>
          
          <!-- Only count input -->
          <div id="count-only-section" class="hidden">
            <div class="form-group" style="max-width: 200px;">
              <label class="form-label">실적 건수</label>
              <input type="number" id="input-count" class="form-input" min="0" value="0">
            </div>
          </div>
          
          <!-- Unspecified input -->
          <div id="unspecified-section" class="hidden">
            <div class="flex gap-2" style="flex-wrap: wrap;">
              <div class="form-group flex-1" style="min-width: 100px;">
                <label class="form-label">실인원</label>
                <input type="number" id="unspec-real" class="form-input" min="0" value="0">
              </div>
              <div class="form-group flex-1" style="min-width: 100px;">
                <label class="form-label">건수</label>
                <input type="number" id="unspec-count" class="form-input" min="0" value="0">
              </div>
              <div class="form-group flex-1" style="min-width: 150px;">
                <label class="form-label flex justify-between items-center">연인원 <button id="btn-toggle-unspec-details" class="btn-ghost" style="padding: 2px 6px; font-size: 12px; height: auto;">+ 세부내용 추가</button></label>
                <input type="number" id="unspec-accum" class="form-input" min="0" value="0">
              </div>
            </div>
            
            <div id="unspec-details" class="glass-card mt-2 hidden" style="background: rgba(0,0,0,0.02);">
              <h4 class="mb-2" style="font-size: 14px; color: var(--color-primary-dark);">연인원 세부내용</h4>
              <div class="flex gap-2 mb-2" style="flex-wrap: wrap;">
                <div class="form-group flex-1" style="min-width: 80px;">
                  <label class="form-label">직원</label>
                  <input type="number" id="unspec-staff" class="form-input" min="0" value="0">
                </div>
                <div class="form-group flex-1" style="min-width: 80px;">
                  <label class="form-label">장애인</label>
                  <input type="number" id="unspec-disabled" class="form-input" min="0" value="0">
                </div>
                <div class="form-group flex-1" style="min-width: 120px;">
                  <label class="form-label">비장애인(지역주민)</label>
                  <input type="number" id="unspec-nondisabled" class="form-input" min="0" value="0">
                </div>
              </div>
              <div class="form-group mb-0">
                <label class="form-label">특이사항(비고)</label>
                <input type="text" id="unspec-remark" class="form-input" placeholder="비고 입력">
              </div>
            </div>
          </div>
          
          <!-- Members list -->
          <div id="members-section" class="hidden">
            <div class="flex flex-mobile-col justify-between items-center mb-2">
              <input type="text" id="search-member" class="form-input" placeholder="이름 검색" style="width: 100%; max-width: 100%;">
              <div>
                <button class="btn-ghost" id="btn-check-all">전체선택</button>
                <button class="btn-ghost" id="btn-uncheck-all">전체해제</button>
              </div>
            </div>
            
            <div id="members-grid" class="attendance-grid">
              <!-- Members injected here -->
            </div>
          </div>

          <div class="mt-3 flex justify-between items-center">
            <button id="btn-save" class="btn-primary">저장하기</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qr-modal">
    <div class="glass-card modal-glass text-center">
      <div class="modal-header">
        <h3>QR 출석체크</h3>
        <button class="btn-ghost" onclick="document.getElementById('qr-modal').classList.remove('active')">X</button>
      </div>
      <p class="mb-2 text-sub">참여자에게 아래 QR코드를 보여주세요. (5분간 유효)</p>
      <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
      <a id="qr-link" href="#" target="_blank" class="btn-ghost" style="font-size: 14px;">새 창에서 열기</a>
    </div>
  </div>

  <!-- Kiosk Mode Page -->
  <div id="kiosk-overlay" class="hidden" style="min-height: 100vh; padding: 20px; padding-bottom: 120px; background: transparent;">
    <div style="max-width: 900px; margin: 0 auto; padding-top: 20px;">
       <div class="flex justify-between items-center mb-3">
         <h1 id="kiosk-title" style="font-size: 28px; font-weight: 700; color: var(--color-primary);">출석체크</h1>
         <button id="btn-exit-kiosk" class="btn-secondary" style="border-radius: 20px;">← 메인 페이지로 돌아가기</button>
       </div>
       <div class="glass-card mb-3" style="text-align: center; padding: 30px 20px; border-radius: 20px;">
         <p style="font-size: 22px; font-weight: 600; color: var(--color-text);">본인의 이름을 선택하고 하단의 <span style="color:var(--color-primary);">[출석 저장하기]</span> 버튼을 눌러주세요.</p>
       </div>
       <div id="kiosk-grid" class="kiosk-grid-layout"></div>
    </div>
    
    <div id="kiosk-bottom-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); display: flex; justify-content: center; z-index: 10000;">
       <button id="btn-kiosk-save" class="btn-primary" style="width: 100%; max-width: 400px; padding: 20px; font-size: 22px; font-weight: 700; border-radius: 40px; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);" disabled>이름을 선택해주세요</button>
    </div>
  </div>

  <script src="js/config.js?v=3"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script src="js/programs.js?v=3"></script>
  <script src="js/attendance.js?v=6"></script>
</body>
</html>
